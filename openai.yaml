openapi: 3.1.0
info:
  title: Obsidian AI MCP Server
  description: Local AI knowledge management layer for Obsidian vaults
  version: 1.0.0

servers:
  - url: stdio
    description: Stdio transport (MCP)

paths: {}

components:
  schemas:
    SearchNotes:
      type: function
      function:
        name: search_notes
        description: >
          Search notes semantically with optional metadata filters.
          Supports filtering by tags, folder, exclude_tags, and date range (mtime).
        parameters:
          type: object
          properties:
            query:
              type: string
              description: The search query string
            n:
              type: integer
              description: Number of results to return (default 5)
              default: 5
            tags:
              type: array
              items:
                type: string
              description: Optional — only notes with ALL of these tags
            exclude_tags:
              type: array
              items:
                type: string
              description: Optional — exclude notes with ANY of these tags
            folder:
              type: string
              description: Optional — only notes inside this vault-relative folder
            date_after:
              type: string
              description: Optional — ISO date (e.g. 2024-06-01), filter by file mtime
            date_before:
              type: string
              description: Optional — ISO date (e.g. 2024-12-31), filter by file mtime
          required:
            - query
        returns:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
                description: Path to the note file
              title:
                type: string
                description: Title of the note
              chunk:
                type: integer
                description: Chunk index within the note
              distance:
                type: number
                format: float
                description: Semantic distance score

    ReadNote:
      type: function
      function:
        name: read_note
        description: Read the full content of a note by path.
        parameters:
          type: object
          properties:
            path:
              type: string
              description: Path to the note file relative to vault root
          required:
            - path
        returns:
          type: string
          description: Full content of the note in Markdown

    WriteNote:
      type: function
      function:
        name: write_note
        description: Create or overwrite a note with the given content.
        parameters:
          type: object
          properties:
            path:
              type: string
              description: Path to the note file relative to vault root
            content:
              type: string
              description: Full Markdown content to write
          required:
            - path
            - content
        returns:
          type: string
          description: Confirmation message

    ListAllNotes:
      type: function
      function:
        name: list_all_notes
        description: Return a list of all note paths in the vault.
        parameters:
          type: object
          properties: {}
        returns:
          type: array
          items:
            type: string
          description: List of note file paths

    ListFolder:
      type: function
      function:
        name: list_folder
        description: Return a list of note paths within a specific folder (recursive).
        parameters:
          type: object
          properties:
            folder_path:
              type: string
              description: Folder path relative to vault root
          required:
            - folder_path
        returns:
          type: array
          items:
            type: string
          description: List of note file paths in the folder

    ListFolderDeep:
      type: function
      function:
        name: list_folder_deep
        description: Return a list of note paths within a specific folder (recursive, includes subdirectories).
        parameters:
          type: object
          properties:
            folder_path:
              type: string
              description: Folder path relative to vault root
          required:
            - folder_path
        returns:
          type: array
          items:
            type: string
          description: List of note file paths in the folder and all subdirectories

    SearchByTags:
      type: function
      function:
        name: search_by_tags
        description: >
          Find notes that have ALL of the given YAML frontmatter tags.
          Returns paths, titles, and matching tags for each note.
        parameters:
          type: object
          properties:
            tags:
              type: array
              items:
                type: string
              description: List of tags to search for (all must match)
            n:
              type: integer
              description: Maximum number of results (default 10)
              default: 10
          required:
            - tags
        returns:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
                description: Path to the note file
              title:
                type: string
                description: Title of the note
              tags:
                type: array
                items:
                  type: string
                description: Matching YAML frontmatter tags

    ReadNoteByTitle:
      type: function
      function:
        name: read_note_by_title
        description: >
          Look up a note by its title (filename without extension) and return the full content.
          If multiple notes share the same title, returns all of them separated by labeled headers.
          Optionally specify a folder_path to scope the search and disambiguate duplicate titles.
        parameters:
          type: object
          properties:
            title:
              type: string
              description: Note title without .md extension (e.g., README)
            folder_path:
              type: string
              description: Optional vault-relative folder path to narrow the search (e.g., Projects)
          required:
            - title
        returns:
          type: string
          description: Full content of the matching note(s) in Markdown

    AddTags:
      type: function
      function:
        name: add_tags
        description: Add tags to a note's YAML frontmatter. Creates frontmatter if absent.
        parameters:
          type: object
          properties:
            path:
              type: string
              description: Path to the note file
            tags:
              type: array
              items:
                type: string
              description: List of tags to add
          required:
            - path
            - tags
        returns:
          type: string
          description: Confirmation with final tags list

    CreateBacklink:
      type: function
      function:
        name: create_backlink
        description: Create mutual [[backlinks]] between two notes.
        parameters:
          type: object
          properties:
            path_a:
              type: string
              description: Path to the first note
            path_b:
              type: string
              description: Path to the second note
          required:
            - path_a
            - path_b
        returns:
          type: string
          description: Confirmation message

    GetIndexStats:
      type: function
      function:
        name: get_index_stats
        description: Return index statistics (total chunks, unique notes, config info).
        parameters:
          type: object
          properties: {}
        returns:
          type: string
          description: Formatted stats string

    SyncIndex:
      type: function
      function:
        name: sync_index
        description: Re-run the full indexer pipeline. Returns count of notes indexed.
        parameters:
          type: object
          properties: {}
        returns:
          type: string
          description: Index sync completion status

    AskVault:
      type: function
      function:
        name: ask_vault
        description: Ask a question about your Obsidian vault. Searches relevant notes and uses LLM to answer.
        parameters:
          type: object
          properties:
            question:
              type: string
              description: Natural language question about vault contents
            top_k:
              type: integer
              description: Number of notes to retrieve for context (default 3)
              default: 3
          required:
            - question
        returns:
          type: string
          description: LLM-generated answer based on vault content

    TagNotes:
      type: function
      function:
        name: tag_notes
        description: Search notes matching a query and auto-suggest tags using LLM.
        parameters:
          type: object
          properties:
            query:
              type: string
              description: Search query to find relevant notes
            top_k:
              type: integer
              description: Number of notes to tag (default 5)
              default: 5
          required:
            - query
        returns:
          type: string
          description: Confirmation with tag map
